<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 280px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #18181b; color: #e4e4e7; font-size: 13px; }
    .container { padding: 12px; }
    h1 { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: #f4f4f5; }
    .status { display: flex; align-items: center; gap: 6px; padding: 8px 10px; border-radius: 6px; margin-bottom: 10px; font-size: 12px; }
    .status.online { background: #052e16; color: #4ade80; }
    .status.offline { background: #450a0a; color: #f87171; }
    .status .dot { width: 6px; height: 6px; border-radius: 50%; }
    .status.online .dot { background: #4ade80; }
    .status.offline .dot { background: #f87171; }
    label { display: block; font-size: 11px; color: #a1a1aa; margin-bottom: 4px; }
    select { width: 100%; background: #27272a; border: 1px solid #3f3f46; color: #e4e4e7; padding: 6px 8px; border-radius: 4px; font-size: 12px; margin-bottom: 10px; outline: none; }
    select:focus { border-color: #6366f1; }
    .actions { display: flex; flex-direction: column; gap: 6px; }
    button { padding: 8px; border: none; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #4f46e5; color: white; }
    .btn-primary:hover:not(:disabled) { background: #4338ca; }
    .btn-secondary { background: #27272a; color: #d4d4d8; border: 1px solid #3f3f46; }
    .btn-secondary:hover:not(:disabled) { background: #3f3f46; }
    .msg { font-size: 11px; text-align: center; padding: 6px; margin-top: 6px; border-radius: 4px; }
    .msg.success { background: #052e16; color: #4ade80; }
    .msg.error { background: #450a0a; color: #f87171; }
    .loading { text-align: center; padding: 20px; color: #71717a; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Synapse</h1>
    <div id="content"><div class="loading">Connecting...</div></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
