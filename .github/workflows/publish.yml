name: Publish & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git and auth
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
          gh auth setup-git

      - name: Set up public remote
        run: |
          git remote add public https://github.com/brian3814/synapse.git
          git fetch public main --depth=1 2>/dev/null || true
          git fetch origin refs/tags/public/latest:refs/tags/public/latest 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_PAT }}

      - name: Test push to public repo
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          EMPTY_TREE=$(git mktree < /dev/null)
          TEST_COMMIT=$(git commit-tree "$EMPTY_TREE" -m "auth test")
          git push public "$TEST_COMMIT":refs/heads/auth-test --force
          git push public --delete refs/heads/auth-test
          echo "Push test passed"

      - name: Publish filtered snapshot
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          ./publish.sh "${TAG} release"

      - name: Push publish state to private repo
        run: |
          git push origin publish --force
          git push origin refs/tags/public/latest --force

  build:
    needs: publish
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & package
        run: npm run dist:mac -- --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: release/*.dmg
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release files
        run: find artifacts -type f | head -20

      - name: Create release on public repo
        uses: softprops/action-gh-release@v2
        with:
          repository: brian3814/synapse
          tag_name: ${{ github.ref_name }}
          name: Synapse ${{ github.ref_name }}
          draft: false
          files: artifacts/*.dmg
          token: ${{ secrets.PUBLIC_REPO_PAT }}
          body: |
            ## Synapse ${{ github.ref_name }}

            ### Downloads
            - **macOS**: `.dmg`

            > ⚠️ Build is unsigned. Right-click → Open on first launch.
